name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @workspace/nearconnect-web build
        env:
          # GitHub Pages serves from /nearconnect-website/ — must match your repo name exactly
          BASE_PATH: /nearconnect-website/
          # Point the frontend at your deployed backend (set this in repo Settings → Secrets)
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: SPA fallback — copy index.html → 404.html
        run: cp artifacts/nearconnect-web/dist/public/index.html artifacts/nearconnect-web/dist/public/404.html

      - name: Add .nojekyll
        run: touch artifacts/nearconnect-web/dist/public/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: artifacts/nearconnect-web/dist/public
          publish_branch: gh-pages
