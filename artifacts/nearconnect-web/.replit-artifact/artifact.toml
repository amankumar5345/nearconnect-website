kind = "web"
previewPath = "/"
title = "NearConnect"
version = "1.0.0"
id = "artifacts/nearconnect-web"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23869

[services.development]
run = "pnpm --filter @workspace/nearconnect-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nearconnect-web", "run", "build" ]
serve = "static"
publicDir = "artifacts/nearconnect-web/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23869"
BASE_PATH = "/"
